<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback</title>
    <style>
        body{
            background-color: #f0f0f0;
            font-family: Arial, sans-serif;
        }
        form{
            text-align: center;
            display: grid;
            width: 60%;
            margin: auto;
        }
    </style>
</head>
<body>
    <h3><a href="../../index.html"><--Voltar</a></h3>
    <h1 style="text-align: center;">Enviar um feedback</h1>
    <p style="text-align: center;">Envie um feedback sobre o que você achou do site</p>
    <form>
        <label for="Nome">Digite seu nome</label>
        <input type="text" name="Nome" placeholder="Digite seu nome completo"> <br>
        <label for="Email">Digite seu email</label>
        <input type="email" name="Email" placeholder="Digite seu email">
        <label for="feedback">Escreva o que você achou do site</label>
        <textarea name="feedback" id="feedback" maxlength="500" placeholder="Máximo de 500 Caracteres"></textarea>
        <button type="submit" style="background-color: green; font-size: large; width: 20%; margin: auto; border-radius: 10px;">Enviar</button>
    </form>
</body>
</html>
